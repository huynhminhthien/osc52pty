name: build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64
            cgo: "0"
            output: dist/osc52pty-windows-amd64.exe
          - target: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            cgo: "1"
            output: dist/osc52pty-linux-amd64
          - target: darwin-amd64
            runner: macos-15-intel
            goos: darwin
            goarch: amd64
            cgo: "1"
            output: dist/osc52pty-darwin-amd64
          - target: darwin-arm64
            runner: macos-15
            goos: darwin
            goarch: arm64
            cgo: "1"
            output: dist/osc52pty-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: Install Linux CGO dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev

      - name: Test
        if: matrix.goos == 'linux'
        run: go test -coverprofile=coverage.txt -covermode=count ./...

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          mkdir -p dist
          go build -trimpath -o "${{ matrix.output }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: osc52pty-${{ matrix.target }}
          path: ${{ matrix.output }}
          if-no-files-found: error
